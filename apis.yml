aid: imperva
name: Imperva
description: Imperva (a Thales company) is a cybersecurity company providing cloud-based
  and on-premises application security, data security, and network security solutions.
  Their developer APIs cover cloud WAF management, DDoS protection, API security,
  advanced bot protection, and data security fabric for enterprises. Developers can
  manage sites, policies, configurations, and analytics programmatically via REST
  APIs authenticated with API keys. Imperva also provides a Python SDK (imperva-sdk)
  for the SecureSphere on-premises MX platform, a Terraform provider for infrastructure-as-code
  provisioning, and a CLI for orchestration and automation workflows.
