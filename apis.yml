apis:
- aid: imperva:cloud-application-security-api
  name: Imperva Cloud Application Security API
  description: REST API for managing Imperva cloud WAF, DDoS protection, CDN, bot
    management, and API security policies. Enables programmatic site provisioning,
    security policy configuration, traffic analytics, and account management. Authenticated
    via API ID and API key obtained from the Imperva management console.
  humanURL: https://docs-cybersec.thalesgroup.com/bundle/cloud-application-security/page/apiv2/cloud-api.htm
  baseURL: https://api.imperva.com
  tags:
  - WAF
  - DDoS Protection
  - CDN
  - Bot Management
  - Cloud Security
  properties:
  - type: Documentation
    url: https://docs-cybersec.thalesgroup.com/bundle/cloud-application-security/page/apiv2/cloud-api.htm
  - type: OpenAPI
    url: https://github.com/imperva/imperva-web-api-composer/blob/master/src/assets/cwaf/cwaf-v1-swagger-3.json
  - type: OpenAPI
    url: openapi/imperva-cloud-application-security-openapi.yml
  - url: graphql/imperva-graphql.md
    type: GraphQL
- aid: imperva:securesphere-open-api
  name: Imperva SecureSphere Open API
  description: REST API for managing on-premises Imperva SecureSphere MX appliances,
    including site configuration, security policies, server groups, web services,
    and threat mitigation rules. Authenticated via username and password credentials
    against the SecureSphere management server host.
  humanURL: https://docs-cybersec.thalesgroup.com/bundle/api-docs/page/api/api-overview.htm
  tags:
  - On-Premises
  - SecureSphere
  - WAF
  - Security Management
  properties:
  - type: Documentation
    url: https://docs-cybersec.thalesgroup.com/bundle/api-docs/page/api/api-overview.htm
  - type: OpenAPI
    url: https://github.com/imperva-dev/securesphere-swagger
  - type: OpenAPI
    url: openapi/imperva-securesphere-openapi.yml
- aid: imperva:api-security
  name: Imperva API Security
  description: API for managing Imperva's API security product, providing visibility
    into API traffic, detection of API vulnerabilities and threats, and enforcement
    of API access policies. Integrates with cloud WAF and gateway environments to
    protect REST, GraphQL, and other API endpoints from attacks.
  humanURL: https://docs-cybersec.thalesgroup.com/bundle/basic-api-security/page/80414.htm
  tags:
  - API Security
  - API Protection
  - Threat Detection
  properties:
  - type: Documentation
    url: https://docs-cybersec.thalesgroup.com/bundle/basic-api-security/page/80414.htm
- aid: imperva:data-security-fabric-api
  name: Imperva Data Security Fabric API
  description: API for managing Imperva's Data Security Fabric (DSF) product, enabling
    automated deployment and configuration of data security monitoring, auditing,
    and analytics across cloud and on-premises data repositories including databases
    and data lakes.
  humanURL: https://docs-cybersec.thalesgroup.com/bundle/api-docs/page/api/api-overview.htm
  tags:
  - Data Security
  - Database Auditing
  - Compliance
  properties:
  - type: Documentation
    url: https://docs-cybersec.thalesgroup.com/bundle/api-docs/page/api/api-overview.htm
